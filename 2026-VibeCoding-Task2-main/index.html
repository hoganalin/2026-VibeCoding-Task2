<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ title：有意義且非空 -->
    <title>志豪 Frontend Engineer｜React 前端工程師個人品牌網站</title>

    <!-- ✅ description：50~160 字 -->
    <meta
      name="description"
      content="志豪的前端工程師個人品牌網站，專注於 React 開發、UI 設計與專案實作，展示技能、作品集與聯絡方式，協助企業快速了解實戰能力。"
    />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background-color: #0d1b2a;
        color: #e0e0e0;
        line-height: 1.6;
      }

      /* ✅ 防止水平捲動（關鍵） */
      html,
      body {
        overflow-x: hidden;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 1rem;
        width: 100%;
      }

      img {
        max-width: 100%;
        height: auto;
        display: block;
      }

      a {
        color: #00b4d8;
        text-decoration: none;
      }

      /* Header */
      .site-header {
        position: sticky;
        top: 0;
        background: #1b263b;
      }

      .nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap; /* ✅ 防爆版 */
      }

      .nav-links {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap; /* ✅ 防 overflow */
      }

      /* Section */
      section {
        padding: 3rem 1rem;
      }

      .hero {
        text-align: center;
      }

      .hero img {
        margin: 1rem auto;
      }

      /* RWD */
      @media (min-width: 768px) {
        .flex {
          display: flex;
          gap: 2rem;
          align-items: center;
        }

        .flex > * {
          flex: 1;
        }
      }

      footer {
        text-align: center;
        padding: 1rem;
        background: #1b263b;
      }
    </style>
  </head>

  <body>
    <header class="site-header">
      <nav class="nav container">
        <div>志豪 Frontend</div>
        <div class="nav-links">
          <a href="#hero">首頁</a>
          <a href="#about">關於</a>
          <a href="#skills">技能</a>
          <a href="#projects">作品</a>
          <a href="#contact">聯絡</a>
        </div>
      </nav>
    </header>

    <main>
      <!-- ✅ 唯一 h1 -->
      <section id="hero" class="hero">
        <h1>React 前端工程師｜打造高效能與高轉換的網站體驗</h1>
        <p>專注於前端開發、UI 設計與專案落地，具備跨部門協作經驗。</p>

        <img
          src="https://source.unsplash.com/800x600/?developer"
          alt="前端工程師正在開發網站畫面"
        />
      </section>

      <section id="about">
        <div class="container flex">
          <div>
            <h2>關於我</h2>
            <p>具備 7+ 年科技業經驗，轉型前端工程師，專注 React 與產品開發。</p>
          </div>

          <img
            src="https://source.unsplash.com/800x600/?workspace"
            alt="工程師工作環境"
          />
        </div>
      </section>

      <section id="skills">
        <div class="container">
          <h2>技能</h2>
          <p>React / JavaScript / API 串接 / UI 設計 / RWD</p>
        </div>
      </section>

      <section id="projects">
        <div class="container flex">
          <div>
            <h2>作品集</h2>
            <p>包含電商網站、後台系統與完整 CRUD 專案。</p>
          </div>

          <img
            src="https://source.unsplash.com/800x600/?code"
            alt="前端專案程式碼畫面"
          />
        </div>
      </section>

      <section id="contact">
        <div class="container">
          <h2>聯絡我</h2>

          <!-- ✅ 全部合法連結 -->
          <div>
            <a href="mailto:hello@example.com">Email</a><br />
            <a href="tel:+886900000000">電話</a><br />
            <a href="https://github.com/yourname">GitHub</a><br />
            <a href="https://linkedin.com/in/yourname">LinkedIn</a>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <p>© 2026 志豪 Frontend Engineer</p>
    </footer>
  </body>
</html>
